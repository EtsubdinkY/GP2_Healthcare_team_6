version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: healthcare_postgres
    environment:
      POSTGRES_DB: healthcare_management
      POSTGRES_USER: healthcare_admin
      POSTGRES_PASSWORD: enpm818t
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./postgresql/data.sql:/docker-entrypoint-initdb.d/02_data.sql
      - ./postgresql/queries.sql:/docker-entrypoint-initdb.d/03_queries.sql

  mongodb:
    image: mongo:6
    container_name: healthcare_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb:/docker-entrypoint-initdb.d

  neo4j:
    image: neo4j:5
    container_name: healthcare_neo4j
    environment:
      NEO4J_AUTH: neo4j/enpm818t-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./neo4j:/var/lib/neo4j/import

  app:
    build: .
    container_name: healthcare_app
    depends_on:
      - postgres
      - mongodb
      - neo4j
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: healthcare_management
      DB_USER: healthcare_admin
      DB_PASSWORD: enpm818t
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: healthcare_management
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: enpm818t-neo4j
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  mongo_data:
  neo4j_data: